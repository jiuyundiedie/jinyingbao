name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3   # 降级到 v3

      - name: Setup Node.js
        uses: actions/setup-node@v3   # 降级到 v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3   # 也降级
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
