name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 强制使用 Node 20（忽略过时警告）
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 预生成 Android 工程
        run: npx expo prebuild --platform android --clean

      - name: 构建 APK（忽略 Gradle 版本警告）
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --warning-mode all --no-daemon --continue || true
          ./gradlew assembleRelease --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
