name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18  # 项目运行时用 18（兼容性好）

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # Gradle 8.8 需要 Java 17+

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android (生成原生代码)
        run: npx expo prebuild --platform android --clean

      # 修复插件仓库（可选，但预防）
      - name: Fix Gradle plugin repositories
        run: |
          echo "allprojects { repositories { google(); mavenCentral() } }" >> android/build.gradle

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
